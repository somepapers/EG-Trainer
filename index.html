function invertAlg(alg){
  return alg.split(" ").reverse().map(m=>{
    if(m.includes("'"))return m.replace("'","")
    if(m.includes("2"))return m
    return m+"'"
  }).join(" ")
}

function percent(c,w){
  let t=c+w
  if(t==0)return "0%"
  return ((c/t*100).toFixed(0))+"%"
}

function initStats(){
  statsCase={}
  CASE_KEYS.forEach(c=>statsCase[c]={correct:0,wrong:0})
}

function D(){ return DATA[currentMode] }

// ==================== 页面导航 ====================
function startTraining(mode){
  currentMode = mode
  document.getElementById("page0").classList.add("hidden")
  document.getElementById("page1").classList.remove("hidden")
  document.getElementById("modeLabel").innerText = mode + " 模式"
  document.getElementById("titleTrain").innerText = mode + " Training"
  document.getElementById("titleStats").innerText = mode + " Case统计"

  // 重置所有checkbox为选中状态
  document.querySelectorAll("#casebox input[type=checkbox]").forEach(b=>b.checked=true)

  loadStats()
  updateStats()
  showPage(1)
  nextScramble()
}

function goHome(){
  document.getElementById("page1").classList.add("hidden")
  document.getElementById("page0").classList.remove("hidden")
  currentMode = ""
}

function showPage(n){
  document.getElementById("trainPage").classList.toggle("hidden", n!=1)
  document.getElementById("statsPage").classList.toggle("hidden", n!=2)
  document.getElementById("navTrain").classList.toggle("active", n==1)
  document.getElementById("navStats").classList.toggle("active", n==2)
}

// ==================== 训练逻辑 ====================
function getSelectedCases(){
  return Array.from(document.getElementById("casebox").querySelectorAll("input:checked")).map(b=>b.value)
}

function nextScramble(){
  let selected = getSelectedCases()
  if(selected.length==0)return

  let d = D()
  let r, tries=0

  do{
    let c = selected[Math.floor(Math.random()*selected.length)]
    let chosen, alg

    if(c==="H"){
      chosen=d.H_cases[Math.floor(Math.random()*d.H_cases.length)]
      alg=chosen.algs[Math.floor(Math.random()*chosen.algs.length)]
      lastHCase=chosen.name
    } else if(c==="Pi"){
      chosen=d.Pi_cases[Math.floor(Math.random()*d.Pi_cases.length)]
      alg=chosen.algs[Math.floor(Math.random()*chosen.algs.length)]
      lastPiCase=chosen.name
    } else if(c==="T"){
      chosen=d.T_cases[Math.floor(Math.random()*d.T_cases.length)]
      alg=chosen.algs[Math.floor(Math.random()*chosen.algs.length)]
      lastTCase=chosen.name
    } else if(c==="L"){
      chosen=d.L_cases[Math.floor(Math.random()*d.L_cases.length)]
      alg=chosen.algs[Math.floor(Math.random()*chosen.algs.length)]
      lastLCase=chosen.name
    } else if(c==="U"){
      chosen=d.U_cases[Math.floor(Math.random()*d.U_cases.length)]
      alg=chosen.algs[Math.floor(Math.random()*chosen.algs.length)]
      lastUCase=chosen.name
    } else if(c==="S"){
      chosen=d.S_cases[Math.floor(Math.random()*d.S_cases.length)]
      alg=chosen.algs[Math.floor(Math.random()*chosen.algs.length)]
      lastSCase=chosen.name
    } else if(c==="AS"){
      chosen=d.AS_cases[Math.floor(Math.random()*d.AS_cases.length)]
      alg=chosen.algs[Math.floor(Math.random()*chosen.algs.length)]
      lastASCase=chosen.name
    }

    r={case:c, alg:alg, name:chosen.name}
    tries++
  }while(r.name===lastSubCase && tries<20)

  currentAlg=r.alg
  currentCase=r.case
  currentScramble=invertAlg(r.alg)
  lastSubCase=r.name

  document.getElementById("shape").innerText="形状: "+r.case
  document.getElementById("scramble").innerText=currentScramble
  document.getElementById("result").innerText=""
}

function correct(){
  statsCase[currentCase].correct++
  saveStats()
  document.getElementById("result").innerText="蒸蚌"
  updateStats()
  setTimeout(nextScramble,2500)
}

function wrong(){
  statsCase[currentCase].wrong++
  saveStats()

  let d = D()
  let showAlg = currentAlg
  if(currentCase==="H"){
    let index=parseInt(lastHCase.replace("H",""))-1
    showAlg=d.H_show_correct[index]
  } else if(currentCase==="Pi"){
    let index=parseInt(lastPiCase.replace("Pi",""))-1
    showAlg=d.Pi_show_correct[index]
  } else if(currentCase==="T"){
    let index=parseInt(lastTCase.replace("T",""))-1
    showAlg=d.T_show_correct[index]
  } else if(currentCase==="L"){
    let index=parseInt(lastLCase.replace("L",""))-1
    showAlg=d.L_show_correct[index]
  } else if(currentCase==="U"){
    let index=parseInt(lastUCase.replace("U",""))-1
    showAlg=d.U_show_correct[index]
  } else if(currentCase==="S"){
    let index=parseInt(lastSCase.replace("S",""))-1
    showAlg=d.S_show_correct[index]
  } else if(currentCase==="AS"){
    let index=parseInt(lastASCase.replace("AS",""))-1
    showAlg=d.AS_show_correct[index]
  }

  document.getElementById("result").innerText="正确公式：\n"+showAlg+"\n菜就多练"
  updateStats()
}

function copyScramble(){
  navigator.clipboard.writeText(currentScramble)
  document.getElementById("result").innerText="已复制"
}

// ==================== 统计 ====================
function updateStats(){
  let html=""
  for(let c in statsCase){
    let d=statsCase[c]
    html+=`<tr><td>${c}</td><td>${d.correct}</td><td>${d.wrong}</td><td class="percent">${percent(d.correct,d.wrong)}</td></tr>`
  }
  document.getElementById("caseStats").innerHTML=html
}

function saveStats(){
  localStorage.setItem(currentMode.toLowerCase()+"_case", JSON.stringify(statsCase))
}

function loadStats(){
  let raw = localStorage.getItem(currentMode.toLowerCase()+"_case")
  if(raw) statsCase = JSON.parse(raw)
  else initStats()
}

function resetStats(){
  localStorage.removeItem(currentMode.toLowerCase()+"_case")
  initStats()
  updateStats()
}

</script>
</body>
</html>
