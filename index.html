<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EG Trainer</title>
<style>
body{font-family:Arial;text-align:center;background:#111;color:white;margin:0;padding:20px}
button{padding:10px 16px;margin:6px;font-size:15px;border:none;border-radius:8px;cursor:pointer}
button:hover{opacity:.9}
.hidden{display:none}
#scramble{font-size:22px;margin:18px;word-break:break-word}
.casebox label{margin:5px;display:inline-block}
table{margin:auto;border-collapse:collapse}
td,th{border:1px solid white;padding:6px 10px}
#result{font-size:22px;margin:15px;white-space:pre-line}
.small{font-size:12px;color:#ccc}
.percent{color:#4cff4c}
.modebtn{font-size:20px;padding:16px 28px;margin:12px}
</style>
</head>
<body>

<div id="modePage">
<h1>EG Trainer</h1>
<h2>选择训练公式</h2>
<button class="modebtn" onclick="startMode('EG0')">EG0</button>
<button class="modebtn" onclick="startMode('EG1')">EG1</button>
<button class="modebtn" onclick="startMode('EG2')">EG2</button>
<p class="small">目前 EG1 已导入，EG0 / EG2 等你提供公式后可继续加入</p>
</div>

<div id="appPage" class="hidden">
<div>
<button onclick="backToMode()">返回选择</button>
<button onclick="showPage(1)">训练</button>
<button onclick="showPage(2)">统计</button>
</div>

<div id="page1">
<h2 id="title">Training</h2>

<div class="casebox">
<label><input type="checkbox" checked value="H">H</label>
<label><input type="checkbox" checked value="Pi">Pi</label>
<label><input type="checkbox" checked value="T">T</label>
<label><input type="checkbox" checked value="L">L</label>
<label><input type="checkbox" checked value="U">U</label>
<label><input type="checkbox" checked value="S">S</label>
<label><input type="checkbox" checked value="AS">AS</label>
</div>

<div id="shape"></div>
<div id="scramble"></div>

<button onclick="copyScramble()">复制打乱</button>
<button onclick="nextScramble()">下一条</button>
<br><br>
<button onclick="correct()">做对了</button>
<button onclick="wrong()">做错了</button>

<div id="result"></div>

<div class="small">
点击做对后会自动切换下一条。<br>
EG0 / EG2 暂时是预留入口。
</div>
</div>

<div id="page2" class="hidden">
<h2>Case统计</h2>
<table>
<tr><th>Case</th><th>正确</th><th>错误</th><th>正确率</th></tr>
<tbody id="caseStats"></tbody>
</table>
<br>
<button onclick="resetStats()">清空统计</button>
</div>
</div>

<script>
const H_cases=[
{name:"H1",algs:["R U R' F' R U R' U' R U R'"]},
{name:"H2",algs:["F' U R U' R2 F2 R U' F"]},
{name:"H3",algs:["R' F R F' U2 F R U2 R' F"]},
{name:"H4",algs:["R U R' F' R U R' U' R U R'"]}
];

let statsCase={};
let currentAlg="",currentCase="",currentScramble="";
let currentMode="";

function startMode(mode){
currentMode=mode;
document.getElementById("modePage").classList.add("hidden");
document.getElementById("appPage").classList.remove("hidden");
document.getElementById("title").innerText=mode+" Training";

if(mode!=="EG1"){
document.getElementById("scramble").innerText="";
document.getElementById("shape").innerText="";
document.getElementById("result").innerText=
mode+" 暂时还没有导入公式";
return;
}

initStats();
updateStats();
nextScramble();
}

function backToMode(){
document.getElementById("modePage").classList.remove("hidden");
document.getElementById("appPage").classList.add("hidden");
}

function invertAlg(alg){
return alg.split(" ").reverse().map(m=>{
if(m.includes("'")) return m.replace("'","");
if(m.includes("2")) return m;
return m+"'";
}).join(" ");
}

function nextScramble(){
if(currentMode!=="EG1") return;

let chosen=H_cases[Math.floor(Math.random()*H_cases.length)];
currentAlg=chosen.algs[0];
currentCase="H";
currentScramble=invertAlg(currentAlg);

document.getElementById("shape").innerText="形状: H";
document.getElementById("scramble").innerText=currentScramble;
document.getElementById("result").innerText="";
}

function correct(){
statsCase[currentCase].correct++;
saveStats();
updateStats();
document.getElementById("result").innerText="蒸蚌";
setTimeout(nextScramble,2500);
}

function wrong(){
statsCase[currentCase].wrong++;
saveStats();
updateStats();
document.getElementById("result").innerText="正确公式:\\n"+currentAlg;
}

function copyScramble(){
navigator.clipboard.writeText(currentScramble);
document.getElementById("result").innerText="已复制";
}

function showPage(n){
document.getElementById("page1").classList.toggle("hidden",n!=1);
document.getElementById("page2").classList.toggle("hidden",n!=2);
}

function initStats(){
statsCase={H:{correct:0,wrong:0}};
}

function updateStats(){
let html="";
for(let c in statsCase){
let d=statsCase[c];
let total=d.correct+d.wrong;
let p=total?Math.round(d.correct/total*100):0;
html+=`<tr><td>${c}</td><td>${d.correct}</td><td>${d.wrong}</td><td class="percent">${p}%</td></tr>`;
}
document.getElementById("caseStats").innerHTML=html;
}

function saveStats(){
localStorage.setItem("eg_demo_stats",JSON.stringify(statsCase));
}

function resetStats(){
localStorage.removeItem("eg_demo_stats");
initStats();
updateStats();
}
</script>

</body>
</html>
