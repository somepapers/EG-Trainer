<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EG Trainer — 二阶EG法公式训练</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 首页：选择训练模式 ===== -->
<div id="page0">
  <div class="home-container fade-in">
    <h1>EG Trainer</h1>
    <p class="subtitle">二阶EG法公式训练工具 · 40 cases × 2 模式</p>

    <button class="home-btn eg0" onclick="startTraining('EG0')">
      <span class="btn-icon">🔴</span>
      <span class="btn-label">EG-0</span>
      <span class="btn-desc">底层已还原 · CLL 40条</span>
    </button>

    <button class="home-btn eg1" onclick="startTraining('EG1')">
      <span class="btn-icon">🔵</span>
      <span class="btn-label">EG-1</span>
      <span class="btn-desc">底层邻角换 · 40条</span>
    </button>

    <button class="home-btn eg2" disabled>
      <span class="btn-icon">⚫</span>
      <span class="btn-label">EG-2</span>
      <span class="btn-desc">底层对角换</span>
      <span class="btn-tag">敬请期待</span>
    </button>

    <p class="home-footer">公式提供 2011CAOS01 · 快捷键 ← → 空格 C</p>
  </div>
</div>

<!-- ===== 训练页 ===== -->
<div id="page1" class="hidden">

  <div class="navbar">
    <button class="btn-back" onclick="goHome()">← 首页</button>
    <button class="nav-btn active" id="navTrain" onclick="showPage(1)">训练</button>
    <button class="nav-btn" id="navStats" onclick="showPage(2)">统计</button>
    <span class="mode-badge" id="modeLabel"></span>
  </div>

  <div class="main-content">

    <!-- 训练 Tab -->
    <div id="trainPage" class="fade-in">
      <h2 id="titleTrain">EG Training</h2>

      <div class="casebox" id="casebox">
        <label><input type="checkbox" checked value="H" onchange="nextScramble()">H</label>
        <label><input type="checkbox" checked value="Pi" onchange="nextScramble()">Pi</label>
        <label><input type="checkbox" checked value="T" onchange="nextScramble()">T</label>
        <label><input type="checkbox" checked value="L" onchange="nextScramble()">L</label>
        <label><input type="checkbox" checked value="U" onchange="nextScramble()">U</label>
        <label><input type="checkbox" checked value="S" onchange="nextScramble()">S</label>
        <label><input type="checkbox" checked value="AS" onchange="nextScramble()">AS</label>
      </div>

      <div class="scramble-card">
        <div id="shape"></div>
        <div id="scramble"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="copyScramble()">📋 复制打乱</button>
        <button class="btn btn-secondary" onclick="nextScramble()">🎲 下一条</button>
      </div>

      <div class="btn-row">
        <button class="btn btn-correct" onclick="correct()">✅ 做对了</button>
        <button class="btn btn-wrong" onclick="wrong()">❌ 做错了</button>
      </div>

      <div id="result"></div>

      <div class="help-text">
        使用说明：勾选需要练习的case后点击下一条刷新<br>
        做对1坤秒后自动切换 · 键盘快捷键：<b>→</b> 做对了 · <b>←</b> 做错了 · <b>空格</b> 下一条 · <b>C</b> 复制
      </div>
    </div>

    <!-- 统计 Tab -->
    <div id="statsPage" class="hidden fade-in">
      <h2 id="titleStats">Case统计</h2>

      <div class="stats-container">
        <table>
          <thead>
            <tr><th>Case</th><th>正确</th><th>错误</th><th>正确率</th></tr>
          </thead>
          <tbody id="caseStats"></tbody>
        </table>

        <button class="btn-reset" onclick="resetStats()">🗑 清空统计</button>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
